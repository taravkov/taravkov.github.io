<svg xmlns="http://www.w3.org/2000/svg" width="300" height="100" viewBox="0 0 300 100">
  <!-- Фон для контраста -->

  <!-- Пиксельный текст "TEE" -->
  <g fill="#00ffcc" style="image-rendering: pixelated;">
    <!-- Буква T -->
    <rect x="10" y="10" width="50" height="10" />
    <rect x="30" y="20" width="10" height="30" />

    <!-- Буква E -->
    <rect x="70" y="10" width="40" height="10" />
    <rect x="70" y="20" width="10" height="30" />
    <rect x="70" y="30" width="30" height="10" />
    <rect x="70" y="50" width="40" height="10" />

    <!-- Вторая буква E -->
    <rect x="130" y="10" width="40" height="10" />
    <rect x="130" y="20" width="10" height="30" />
    <rect x="130" y="30" width="30" height="10" />
    <rect x="130" y="50" width="40" height="10" />
  </g>
</svg>
