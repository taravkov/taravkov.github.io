<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100" viewBox="0 0 200 100">
  <!-- Фон для контраста -->
    
  <!-- Пиксельный текст "CJ" -->
  <g fill="#00ffcc" style="image-rendering: pixelated;">
    <!-- Буква C с срезанным верхним левым углом (треугольник) -->
    <polygon points="10,20 20,10 20,20" fill="#00ffcc" />
    <rect x="20" y="10" width="10" height="10" />
    <rect x="30" y="10" width="10" height="10" />
    <!-- Срезаем верхний правый угол -->
    <rect x="40" y="10" width="10" height="5" />
    <rect x="10" y="20" width="10" height="10" />
    <rect x="10" y="30" width="10" height="10" />
    <rect x="10" y="40" width="40" height="10" />
    
    <!-- Буква J -->
    <rect x="60" y="10" width="40" height="10" />
    <rect x="90" y="20" width="10" height="20" />
    <rect x="60" y="40" width="30" height="10" />
    <rect x="60" y="30" width="10" height="10" />
  </g>
</svg>
