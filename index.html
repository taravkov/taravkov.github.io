<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#fde072">
    <title>cj-tee</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #ffefba, #f8d800);
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            grid-gap: 20px;
            justify-items: center;
        }

        .video-item {
            width: 100%;
            max-width: 560px;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 315px;
        }

        .video-placeholder {
            position: relative;
            display: block;
            width: 100%;
            height: 315px;
            background-color: #000;
        }

        .video-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-button-svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 68px;
            height: 48px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            iframe,
            .video-placeholder {
                height: 200px;
            }

            .play-button-svg {
                width: 50px;
                height: 35px;
            }
        }

        @media (max-width: 480px) {
            iframe,
            .video-placeholder {
                height: 180px;
            }

            .play-button-svg {
                width: 40px;
                height: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="video-grid">
      <div class="video-item">
          <iframe width="560" height="315" src="https://www.youtube.com/embed/uP05coVgi7w" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>

        <div class="video-item">
            <a href="https://www.youtube.com/watch?v=uMNrVhJvNOc" class="video-placeholder" target="_blank">
                <img src="https://img.youtube.com/vi/uMNrVhJvNOc/hqdefault.jpg" alt="Видео недоступно для встраивания">
                <svg class="play-button-svg" viewBox="0 0 68 48" version="1.1">
                    <path class="ytp-large-play-button-bg" d="M66.52,7.74c-0.78-2.93-2.49-5.41-5.42-6.19C55.79,.13,34,0,34,0S12.21,.13,6.9,1.55 C3.97,2.33,2.27,4.81,1.48,7.74C0.06,13.05,0,24,0,24s0.06,10.95,1.48,16.26c0.78,2.93,2.49,5.41,5.42,6.19 C12.21,47.87,34,48,34,48s21.79-0.13,27.1-1.55c2.93-0.78,4.64-3.26,5.42-6.19C67.94,34.95,68,24,68,24S67.94,13.05,66.52,7.74z" fill="#f00"></path>
                    <path d="M 45,24 27,14 27,34" fill="#fff"></path>
                </svg>
            </a>
        </div>
        <div class="video-item">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/AHzrweDZTp4" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="video-item">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/zQFPgRiBFPU" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

</body>
</html>
